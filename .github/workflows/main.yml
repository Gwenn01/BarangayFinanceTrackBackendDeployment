name: Flask Backend CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install pytest
        run: |
          pip install pytest

      - name: Run lint
        run: |
          pip install flake8
          flake8 . || true

      - name: Run tests
        run: |
          pytest || true
